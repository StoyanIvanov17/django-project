{% load static %}

<section class="hero">
    <div class="hero-content">
        <h1>{{ section.name }}</h1>
        <p>{{ section.homepage_description }}</p>

        <div class="hero-buttons">
            <a href="#">
                Shop {{ section.name}}
            </a>
        </div>
    </div>

    <div class="hero-wrapper">
        <img src="{{ section.homepage_image.url }}" alt="{{ section.name }}">
    </div>
</section>
